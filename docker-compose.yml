# Gold Monitor Docker Compose 编排
version: '3.8'

services:
  gold-monitor:
    build: .
    container_name: gold-monitor
    restart: unless-stopped
    ports:
      - "5051:5051"
    volumes:
      # 持久化数据文件
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
      # 挂载配置文件（可选，方便修改）
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      # 网关地址：通过共享网络直接用容器名访问
      - GATEWAY_URL=http://hellocola-gateway:3000
      # 本服务的回调地址：网关通过共享网络访问本容器
      - GATEWAY_TARGET=http://gold-monitor:5051
    networks:
      - hellocola-net
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5051/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  hellocola-net:
    external: true
