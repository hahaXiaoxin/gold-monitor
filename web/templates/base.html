<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gold Monitor{% endblock %} - 黄金智能盯盘</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚜️</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ config.get('VERSION', '2') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">⚜️</span>
                <span class="brand-text">Gold Monitor</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">仪表盘</a>
                <a href="/history" class="nav-link {% block nav_history %}{% endblock %}">历史记录</a>
            </div>
            <div class="nav-status">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">连接中...</span>
                <span class="update-time" id="updateTime"></span>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <span>Gold Monitor © {{ now().year if now is defined else 2024 }} | Cola-Gold 黄金信息采集</span>
            <span class="footer-info">AI 驱动 · 多源采集 · 智能分析</span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ config.get('VERSION', '2') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
